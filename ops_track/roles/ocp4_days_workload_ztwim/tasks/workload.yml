---
- name: Ensure namespace exists
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Namespace
    name: "{{ ocp4_days_workload_ztwim_namespace }}"

- name: Install Zero Trust Workload Identity Manager operator
  ansible.builtin.include_role:
    name: install_operator
  vars:
    install_operator_action: install
    install_operator_name: "{{ ocp4_days_workload_ztwim_package }}"
    install_operator_namespace: "{{ ocp4_days_workload_ztwim_namespace }}"
    install_operator_channel: "{{ ocp4_days_workload_ztwim_channel }}"
    install_operator_automatic_install_plan_approval: "{{ ocp4_days_workload_ztwim_automatic_install_plan_approval }}"
    install_operator_catalogsource_setup: "{{ ocp4_days_workload_ztwim_use_catalog_snapshot }}"
    install_operator_install_csv_ignore_error: true

- name: Wait for ZTWIM operator deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ ocp4_days_workload_ztwim_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=zero-trust-workload-identity-manager"
  register: r_ztwim_deployment
  until:
    - r_ztwim_deployment.resources | length > 0
    - r_ztwim_deployment.resources[0].status.readyReplicas is defined
    - r_ztwim_deployment.resources[0].status.readyReplicas | int >= 1
  retries: 30
  delay: 10

- name: ZTWIM operator installation complete
  ansible.builtin.debug:
    msg: "Zero Trust Workload Identity Manager operator installed successfully."
