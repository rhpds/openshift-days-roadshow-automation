---
# Creates cloud provider credentials in ACM for provisioning managed clusters.
# Supports Azure, AWS, and KubeVirt providers. The workshop uses KubeVirt
# to provision HCP clusters on the local CNV infrastructure.
ocp_username: admin
silent: false

# Common variables (overridden by secrets includes in agnosticv)
ocp4_token: CHANGEME
ssh_privatekey: CHANGEME
ssh_publickey: CHANGEME

ocp4_workload_rhacm_cloud_credentials_namespace: open-cluster-management

# Azure Cloud credentials
az_acm_secret_name: azure-secret
# az_acm_secret_namespace: "open-cluster-management"
az_root_dns_zone: "{{ guid }}.{{ azure_root_dns_zone }}"
az_resource_group_name: "openenv-{{ guid }}"
az_service_principal:
  clientId: "{{ azapp.applications[0].app_id }}"
  clientSecret: "{{ azpass }}"
  subscriptionId: "{{ assignedsubscription.subscriptions[0].subscription_id }}"
  tenantId: "{{ azure_tenant }}"

# AWS Cloud credentials
account_user_access_key: CHANGEME
account_user_secret_access_key: CHANGEME
# AWS ACM secret name
aws_acm_secret_name: aws-secret
ocp4_base_domain: CHANGEME

# AWS ACM namespace (optional)
# aws_acm_secret_namespace: CHANGEME

# KubeVirt credentials — creates a provider secret using the cluster's
# own kubeconfig so ACM can provision HCP clusters on local CNV.
# Also installs the hcp CLI when install_hcp_cli is true.
ocp4_workload_rhacm_cloud_credentials_kubevirt: false
ocp4_workload_rhacm_cloud_credentials_kubevirt_secret_name: kubevirt-secret
