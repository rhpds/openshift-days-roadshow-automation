---
# ==============================================================================
# CLUSTER CLEANUP
# 1. Disables unused default OLM catalog sources to stop image churn
# 2. Prunes unused container images from all nodes
#
# Compact 3-node clusters with many operators accumulate 60+ GB of stale
# container images from OLM catalog refreshes and operator upgrades. On 100GB
# disks the default kubelet GC threshold (85%) is too high — pods get evicted
# before GC kicks in (e.g. ACS scanner-db).
#
# This role should run BEFORE heavy workloads like ACS that are sensitive
# to disk pressure.
# ==============================================================================

# ==============================================================================
# PHASE 1: Disable unused catalog sources
# The default certified-operators and redhat-marketplace catalogs serve zero
# subscriptions in this workshop but each one pulls ~1.2 GB index images that
# refresh periodically, leaving stale copies on every node.
# ==============================================================================

- name: Build catalog sources disable list
  set_fact:
    _catalog_disable_list: >-
      {{ ocp4_workload_cluster_cleanup_disable_catalogs
         | map('regex_replace', '^(.*)$', '{"name": "\1", "disabled": true}')
         | map('from_json') | list }}

- name: Disable unused default catalog sources
  kubernetes.core.k8s:
    api_version: config.openshift.io/v1
    kind: OperatorHub
    name: cluster
    state: patched
    definition:
      spec:
        sources: "{{ _catalog_disable_list }}"
  ignore_errors: true

- name: Wait for disabled catalog source pods to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: openshift-marketplace
    label_selectors:
      - "olm.catalogOperator.version"
  register: r_catalog_pods
  vars:
    _disabled_pattern: "{{ ocp4_workload_cluster_cleanup_disable_catalogs | join('|') }}"
    _active_pods: >-
      {{ r_catalog_pods.resources | default([])
         | selectattr('status.phase', 'equalto', 'Running')
         | selectattr('metadata.name', 'search', _disabled_pattern)
         | list }}
  retries: 12
  delay: 5
  until: _active_pods | length == 0
  ignore_errors: true

# ==============================================================================
# PHASE 2: Prune unused container images
# crictl rmi --prune only removes images not referenced by any running
# container, so this is safe to run at any point during deployment.
# ==============================================================================

- name: Check if oc CLI is configured
  command: oc whoami
  register: r_oc_check
  ignore_errors: true
  changed_when: false

- name: Get list of cluster nodes
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: r_nodes
  ignore_errors: true

- name: Prune unused container images on each node
  when:
    - r_oc_check is succeeded
    - r_nodes is succeeded
  shell: |
    DISK_BEFORE=$(oc debug node/{{ item }} -- chroot /host df -h /var 2>/dev/null | tail -1)
    PRUNE_OUTPUT=$(oc debug node/{{ item }} -- chroot /host crictl rmi --prune 2>&1)
    DELETED=$(echo "${PRUNE_OUTPUT}" | grep -c "^Deleted:" || true)
    sleep 5
    DISK_AFTER=$(oc debug node/{{ item }} -- chroot /host df -h /var 2>/dev/null | tail -1)
    echo "Node: {{ item }}"
    echo "  Before: ${DISK_BEFORE}"
    echo "  Pruned: ${DELETED} images"
    echo "  After:  ${DISK_AFTER}"
  loop: "{{ r_nodes.resources | map(attribute='metadata.name') | list }}"
  loop_control:
    label: "{{ item }}"
  register: r_image_prune
  ignore_errors: true

- name: Display image prune results
  debug:
    msg: "{{ item.stdout_lines | default(['skipped']) }}"
  loop: "{{ r_image_prune.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown') }}"
  when: r_image_prune is defined
  ignore_errors: true
